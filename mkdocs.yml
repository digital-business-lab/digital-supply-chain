site_name: Digital Open-Source Supply Chain
site_url: https://digital-business-lab.github.io/digital-supply-chain/
repo_url: https://github.com/digital-business-lab/digital-supply-chain
repo_name: digital-business-lab/digital-supply-chain
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: green
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: green
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.code.copy

nav:
  - Home: index.md
  - Architecture:
    - Overview: architecture.md
    - Lab Cloud: lab-cloud.md
    - Hyperledger Fabric: hyperledger-fabric.md
    - B2B Communication: b2b-communication.md
    - LoRaWAN (Farm): lorawan.md
    - Network: network.md
  - Lab Islands:
    - Farm Island: islands/farm.md
    - Farm Island — ERP Config & Demo Data: islands/farm-erp.md
    - Farm Island — Node-RED Flows: islands/farm-nodered.md
    - Factory Island: islands/factory.md
    - Distributor Island: islands/distributor.md
    - Coffee House Island: islands/coffeehouse.md
    - Service Centre (optional): islands/service-centre.md
  - Teaching:
    - Didactic Scenarios: didactic-scenarios.md
  - Operations:
    - Backup & VM Templates: operations.md
    - GitOps Workflow: gitops.md
    - Architecture Decisions: decisions.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
