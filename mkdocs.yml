site_name: SCM Lab — Digital Open-Source Supply Chain
site_url: https://digital-business-lab.github.io/digital-supply-chain/
repo_url: https://github.com/digital-business-lab/digital-supply-chain
repo_name: digital-business-lab/digital-supply-chain
edit_uri: edit/main/

docs_dir: .
site_dir: site

exclude_docs: |
  CLAUDE.md
  site/
  farm-island/docs/
  factory-island/docs/
  distributor-island/docs/
  coffeehouse-island/docs/
  lab-cloud/

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: green
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: green
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.code.copy

nav:
  - Home: README.md
  - Architecture:
    - Overview: docs/architecture.md
    - Lab Cloud: docs/lab-cloud.md
    - Hyperledger Fabric: docs/hyperledger-fabric.md
    - B2B Communication: docs/b2b-communication.md
    - LoRaWAN (Farm): docs/lorawan.md
    - Network: docs/network.md
  - Lab Islands:
    - Farm Island: farm-island/README.md
    - Factory Island: factory-island/README.md
    - Distributor Island: distributor-island/README.md
    - Coffee House Island: coffeehouse-island/README.md
  - Teaching:
    - Didactic Scenarios: docs/didactic-scenarios.md
  - Operations:
    - Backup & VM Templates: docs/operations.md
    - GitOps Workflow: docs/gitops.md
    - Architecture Decisions: docs/decisions.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
