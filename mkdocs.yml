site_name: Digital Open-Source Supply Chain
site_url: https://digital-business-lab.github.io/digital-supply-chain/
repo_url: https://github.com/digital-business-lab/digital-supply-chain
repo_name: digital-business-lab/digital-supply-chain
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: green
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: green
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.code.copy

nav:
  - Home: index.md
  - Architecture:
    - Overview: architecture/index.md
    - Hyperledger Fabric: architecture/hyperledger-fabric.md
    - B2B Communication: architecture/b2b-communication.md
    - LoRaWAN (Farm): islands/farm/lorawan.md
    - Network: architecture/network.md
  - Lab Islands:
    - Farm Island: islands/farm/index.md
    - Farm Island — Setup Guide: islands/farm/setup.md
    - Farm Island — ERP Config & Demo Data: islands/farm/erp.md
    - Farm Island — Node-RED Flows: islands/farm/nodered.md
    - Factory Island: islands/factory/index.md
    - Distributor Island: islands/distributor/index.md
    - Coffee House Island: islands/coffeehouse/index.md
    - Service Centre (optional): islands/service-centre/index.md
  - Teaching:
    - Didactic Scenarios: teaching/didactic-scenarios.md
  - Operations:
    - Supply Chain Setup Guide: operations/setup-guide.md
    - Lab Cloud Setup Guide: lab-cloud/setup.md
    - Lab Cloud Overview: lab-cloud/index.md
    - Workstation Setup: operations/setup-workstation.md
    - Backup & VM Templates: operations/index.md
    - GitOps Workflow: operations/gitops.md
    - Architecture Decisions: architecture/decisions.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
