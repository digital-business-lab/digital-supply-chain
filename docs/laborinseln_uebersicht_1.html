<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">

<title>Laborinseln Übersicht — Open-Source-Lieferkette</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    background: #f8f7f2;
    margin: 0;
    padding: 2rem;
    color: #2c2c2a;
  }
  h1 {
    font-size: 18px;
    font-weight: 500;
    margin: 0 0 0.5rem;
    color: #2c2c2a;
  }
  p {
    font-size: 13px;
    color: #5f5e5a;
    margin: 0 0 1.5rem;
  }
  .card {
    background: #fff;
    border: 1px solid #d3d1c7;
    border-radius: 12px;
    padding: 1.5rem;
    max-width: 860px;
  }
  svg text { font-family: system-ui, sans-serif; }

  /* Color ramps — light mode */
  .c-green rect, .c-green circle, .c-green ellipse { fill: #EAF3DE; stroke: #3B6D11; }
  .c-green .th { fill: #27500A; font-weight: 500; font-size: 14px; }
  .c-green .ts { fill: #3B6D11; font-size: 12px; }

  .c-amber rect, .c-amber circle, .c-amber ellipse { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber .th { fill: #633806; font-weight: 500; font-size: 14px; }
  .c-amber .ts { fill: #854F0B; font-size: 12px; }

  .c-teal rect, .c-teal circle, .c-teal ellipse { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal .th { fill: #085041; font-weight: 500; font-size: 14px; }
  .c-teal .ts { fill: #0F6E56; font-size: 12px; }

  .c-gray rect, .c-gray circle, .c-gray ellipse { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray .th { fill: #444441; font-weight: 500; font-size: 14px; }
  .c-gray .ts { fill: #5F5E5A; font-size: 12px; }

  .th { font-weight: 500; font-size: 14px; fill: #2c2c2a; }
  .ts { font-size: 12px; fill: #5f5e5a; }
  .arr { fill: none; stroke: #888780; stroke-width: 1.5; }
  .node { cursor: default; }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a18; color: #c2c0b6; }
    .card { background: #2c2c2a; border-color: #444441; }
    h1 { color: #c2c0b6; }
    .c-green rect, .c-green circle, .c-green ellipse { fill: #27500A; stroke: #97C459; }
    .c-green .th { fill: #C0DD97; }
    .c-green .ts { fill: #97C459; }
    .c-amber rect, .c-amber circle, .c-amber ellipse { fill: #633806; stroke: #EF9F27; }
    .c-amber .th { fill: #FAC775; }
    .c-amber .ts { fill: #EF9F27; }
    .c-teal rect, .c-teal circle, .c-teal ellipse { fill: #085041; stroke: #5DCAA5; }
    .c-teal .th { fill: #9FE1CB; }
    .c-teal .ts { fill: #5DCAA5; }
    .c-gray rect, .c-gray circle, .c-gray ellipse { fill: #444441; stroke: #B4B2A9; }
    .c-gray .th { fill: #D3D1C7; }
    .c-gray .ts { fill: #B4B2A9; }
    .th { fill: #c2c0b6; }
    .ts { fill: #888780; }
  }
</style>
</head>
