# Mosquitto MQTT-Broker — Farm-Insel
# Interner Broker, nur im farm-net erreichbar

listener 1883
protocol mqtt

# Kein Passwort intern (Absicherung über Docker-Netzwerk)
allow_anonymous true

# Persistenz
persistence true
persistence_location /mosquitto/data/
persistence_file mosquitto.db

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true

# Maximale Verbindungen (0 = unbegrenzt)
max_connections -1
