# Mosquitto MQTT Broker — Farm Island
# Internal broker, accessible only within farm-net

listener 1883
protocol mqtt

# No password internally (secured via Docker network)
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/
persistence_file mosquitto.db

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true

# Maximum connections (0 = unlimited)
max_connections -1
